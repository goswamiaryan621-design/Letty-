<!DOCTYPE html>
<html> 
<head>
<title>Ario AI</title> 

<style>
body{
background:#0b0b0b;
color:white;
font-family:Arial;
text-align:center;
}

input{
width:70%;
padding:12px;
}

button{
padding:12px;
}
</style>

</head>

<body>

<h1>🤖 Ario AI Assistant</h1>

<input id="command" placeholder="Talk to Ario">
<button onclick="run()">Send</button>
<button onclick="startVoice()">🎤 Speak</button>
<p id="output"></p>

<script>



function run(){

let cmd =
document.getElementById("command")
.value.toLowerCase();

let reply="Sorry, I don't understand yet.";

if(cmd.includes("hello"))
reply="Hello Aryan 👋 I am Ario.";

else if(cmd.includes("how are you"))
reply="I am working perfectly.";

else if(cmd.includes("youtube")){
reply="Opening YouTube";
window.open("https://youtube.com");
}

else if(cmd.includes("google")){
reply="Opening Google";
window.open("https://google.com");
}

else if(cmd.includes("instagram")){
reply="Opening Instagram";
window.open("https://instagram.com");
}

else if(cmd.includes("time"))
reply="Current time is "
+ new Date().toLocaleTimeString();

else if(cmd.includes("date"))
reply=new Date().toDateString();

else if(cmd.includes("kyu re"))
reply="I am your assistant. Please talk respectfully."; 

document.getElementById("output")
.innerText=reply;

let recognition;

function startVoice(){

const SpeechRecognition =
window.SpeechRecognition ||
window.webkitSpeechRecognition;

if(!recognition){
recognition = new SpeechRecognition();

recognition.lang="en-US";

recognition.onresult=function(event){

let speech =
event.results[0][0].transcript;

document.getElementById("command").value=speech;

run();
};

recognition.onerror=function(e){
alert("Mic error: "+e.error);
};
}

setTimeout(()=>{
recognition.start();
},300);

}
async function askAI(message){

const response = await fetch(
"https://openrouter.ai/api/v1/chat/completions",
{
method:"POST",
headers:{
"Authorization":"Bearer YOUR_AP",
"Content-Type":"application/json"
},
body:JSON.stringify({
model:"openai/gpt-3.5-turbo",
messages:[
{role:"user",content:message}
]
})
});

const data = await response.json();

return data.choices[0].message.content;
async function askAI(message){

const response = await fetch(
"https://openrouter.ai/api/v1/chat/completions",
{
method:"POST",
headers:{
"Authorization":"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",
"Content-Type":"application/json"
},
body:JSON.stringify({
model:"openai/gpt-3.5-turbo",
messages:[
{role:"user",content:message}
]
})
});

const data = await response.json();

return data.choices[0].message.content;

}
 else{

document.getElementById("output")
.innerText="Thinking...";

askAI(cmd).then(ans=>{
document.getElementById("output")
.innerText=ans;
});

return;
  }

</script>

</body>
</html>
